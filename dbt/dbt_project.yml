name: 'ecommerce_sentiment'
version: '1.0.0'
config-version: 2

profile: 'ecommerce_db'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_modules"]

require-dbt-version: [">=1.5.0", "<2.0.0"]

models:
  ecommerce_sentiment:
    landing:
      +materialized: table
    staging:
      +materialized: view
    intermediate:
      +materialized: view
    mart:
      +materialized: table