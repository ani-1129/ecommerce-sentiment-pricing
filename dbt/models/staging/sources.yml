version: 2

sources:
  - name: raw
    database: ecommerce_db
    schema: public
    
    tables:
      - name: raw_reviews
        description: "Landing zone for raw customer reviews"
        columns:
          - name: review_id
            tests:
              - unique
              - not_null
          
          - name: product_id
            tests:
              - not_null
          
          - name: customer_id
            tests:
              - not_null
          
          - name: rating
            tests:
              - not_null
              - min_value: {value: 1}
              - max_value: {value: 5}
          
          - name: review_text
            tests:
              - not_null
          
          - name: review_date
            tests:
              - not_null
          
          - name: verified_purchase
            tests:
              - not_null
          
          - name: loaded_at
            tests:
              - not_null
          
          - name: sentiment_json
            tests: []
          
      - name: raw_orders
        description: "Landing zone for raw orders"
        columns:
          - name: order_id
            tests:
              - unique
              - not_null
          
          - name: customer_id
            tests:
              - not_null
          
          - name: product_id
            tests:
              - not_null
          
          - name: quantity
            tests:
              - not_null
          
          - name: price
            tests:
              - not_null
              - min_value: {value: 0}
          
          - name: order_status
            tests:
              - not_null
          
          - name: order_date
            tests:
              - not_null
          
          - name: shipping_city
            tests:
              - not_null
          
          - name: loaded_at
            tests:
              - not_null